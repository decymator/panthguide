<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Decymatorownia Reborn</title>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" type="image/x-icon" href="../images/moth.ico">
</head>
<body>
    <div class="header">
        <h1 class="titleh">DECYMATOROWNIA REBORN</h1>
        <div class="header-buttons">
            <button onclick="location.href='../index.html'" class="header-btn">Home</button>
            <button onclick="location.href='log.html'" class="header-btn">Update Log</button>
        </div>
    </div>
    <div class="main">
        <div class="text-wrapper">
            <h1 class="text" id="lane-title">PANTHEON ??? LANE</h1>
        </div>
        <div class="render">
            <img src="../images/Pantheon_Render.png">
        </div>
        <div class="item-grid" id="item-grid">
            <div class="item-slot"><img id="item1" src="" alt="item 1"></div>
            <div class="item-slot"><img id="item2" src="" alt="item 2"></div>
            <div class="item-slot"><img id="item3" src="" alt="item 3"></div>
            <div class="item-slot"><img id="item4" src="" alt="item 4"></div>
            <div class="item-slot"><img id="item5" src="" alt="item 5"></div>
            <div class="item-slot"><img id="item6" src="" alt="item 6"></div>
        </div>

        <button class="reroll-btn" onclick="randomize()">&#x21BA; Losuj ponownie</button>

        <h2 class="desc" id="desc-text"></h2>
        <img id="rune-img" src="" class="runes">
        <div class="spells">
            <img src="../images/flash.png">
            <img src="../images/ignite.png">
        </div>
        <div class="skill"><img src="../images/skillorder.png"></div>
    </div>
    <br>
    <footer>&copy; 2025 DECYMATOROWNIA<img src="../images/poro.jpg" class="poro"></footer>

    <script>
        const BOOTS = [
            "../items/boots/tread.png",
            "../items/boots/plate.png",
            "../items/boots/swift.png",
        ];

        const NON_BOOT_ITEMS = [
            "../items/yom.png",
            "../items/bast.png",
            "../items/sun.png",
            "../items/black.png",
            "../items/ser.png",
            "../items/serp.png",
            "../items/ster.png",
        ];
        const SUPPORT_FIRST_ITEM = "../items/song.png";

        const LANES = [
            {
                name: "TOP LANE",
                badge: "Top Lane",
                rune: "../images/rune-top.png",
            },
            {
                name: "MID LANE",
                badge: "Mid Lane",
                rune: "../images/rune-mid.png",
            },
            {
                name: "SUPPORT",
                badge: "Support",
                rune: "../images/rune-sup.png",
            }
        ];

        let currentAudio = null;

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function randomize() {

            const lane = LANES[Math.floor(Math.random() * LANES.length)];

            const boot = BOOTS[Math.floor(Math.random() * BOOTS.length)];

            const isSupport = lane.name === "SUPPORT";
            const shuffled = shuffle(NON_BOOT_ITEMS);
            const picked = shuffled.slice(0, isSupport ? 4 : 5);

            const items = isSupport
                ? [SUPPORT_FIRST_ITEM, boot, picked[0], picked[1], picked[2], picked[3]]
                : [picked[0], boot, picked[1], picked[2], picked[3], picked[4]];

            document.getElementById("lane-title").textContent = `PANTHEON ${lane.name}`;
            document.getElementById("rune-img").src = lane.rune;
            document.getElementById("desc-text").textContent = lane.desc;

            for (let i = 0; i < 6; i++) {
                document.getElementById(`item${i + 1}`).src = items[i];
            }
        }


        randomize();
    </script>
    <script src="script.js"></script>
</body>
</html>
